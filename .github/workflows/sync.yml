name: Portfolio Sync

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours (captures Thai/US open/close more accurately)
  workflow_dispatch:          # Allow manual trigger

jobs:
  sync:
    name: Update prices and record snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 1 — Update Price Cache
        run: node scripts/update-price-cache.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Step 2 — Record Portfolio Snapshot
        run: node scripts/record-portfolio-snapshot.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
